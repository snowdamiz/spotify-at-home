app = "broadside"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    BROADSIDE_API_BASE_URL = "http://127.0.0.1:3101"

[env]
  API_PORT = "3101"
  APP_WEB_ORIGIN = "https://broadside.fly.dev"
  GOOGLE_REDIRECT_URI = "https://broadside.fly.dev/api/auth/google/callback"
  HOST = "127.0.0.1"
  NODE_ENV = "production"
  PORT = "3000"
  R2_KEY_PREFIX = "broadside/audio"
  R2_REGION = "auto"
  R2_BUCKET = "broadside"
  BROADSIDE_API_BASE_URL = "http://127.0.0.1:3101"
  BROADSIDE_AUDIO_STORAGE_DRIVER = "r2"
  BROADSIDE_DATABASE_PATH = "/data/broadside.sqlite"

[mounts]
  source = "tunely_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
